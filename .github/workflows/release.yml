name: Release

# Manual-only: cutting a release is "run this with a version number." The
# version bump happens on a fresh release/* branch off main (so the release
# itself isn't blocked on anything), which is then merged straight into main
# and deleted. No PR step - if branch protection gets added to main later,
# this direct push/merge will need revisiting then.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without a leading v (e.g. 1.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate version input
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must look like X.Y.Z (no leading v), got: $VERSION"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::tag v$VERSION already exists"
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Syntax-check sources
        run: node --check bin/bob-openai-server.mjs && for f in src/*.mjs; do node --check "$f"; done

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create release branch
        run: git checkout -b "release/v${{ inputs.version }}"

      - name: Bump package.json version
        run: npm pkg set version="${{ inputs.version }}"

      - name: Commit and push version bump
        run: |
          git add package.json
          git commit -m "Release v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"

      # npm pack respects "files" in package.json, so this contains exactly
      # what install.sh will later `npm install -g` from - bin/, src/, and
      # README.md, nothing test/CI-only. Run after the version bump so the
      # packed package.json (and tarball filename) reflect the new version.
      - name: Pack tarball
        run: npm pack

      - name: Create release (and tag) and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" ./*.tgz \
            --title "v${{ inputs.version }}" \
            --target "$(git rev-parse HEAD)" \
            --generate-notes

      - name: Merge release branch into main
        run: |
          git checkout main
          git merge --ff-only "release/v${{ inputs.version }}"
          git push origin main

      - name: Delete release branch
        run: git push origin --delete "release/v${{ inputs.version }}"
