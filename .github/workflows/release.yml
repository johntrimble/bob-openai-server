name: Release

# Manual-only: cutting a release is "run this with a version number." The
# version bump happens on a fresh release/* branch off main, not a direct
# push to main - that branch is what actually gets tagged and released (so
# the release isn't blocked on anything), and a PR back into main is opened
# and auto-merged so main ends up with the same version bump. Auto-merge
# (rather than an immediate merge) means this keeps working unchanged if
# branch protection is ever added later - it'll just wait for whatever's
# required instead of failing outright. Requires "Allow auto-merge" enabled
# in the repo's settings (Settings -> General -> Pull Requests) - a one-time
# setup step, not something this file can turn on by itself.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, without a leading v (e.g. 1.1.0)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate version input
        run: |
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must look like X.Y.Z (no leading v), got: $VERSION"
            exit 1
          fi
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "::error::tag v$VERSION already exists"
            exit 1
          fi
        env:
          VERSION: ${{ inputs.version }}

      - name: Syntax-check sources
        run: node --check bin/bob-openai-server.mjs && for f in src/*.mjs; do node --check "$f"; done

      - name: Create release branch
        run: git checkout -b "release/v${{ inputs.version }}"

      - name: Bump package.json version
        run: npm pkg set version="${{ inputs.version }}"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "Release v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"

      # npm pack respects "files" in package.json, so this contains exactly
      # what install.sh will later `npm install -g` from - bin/, src/, and
      # README.md, nothing test/CI-only. Run after the version bump so the
      # packed package.json (and tarball filename) reflect the new version.
      - name: Pack tarball
        run: npm pack

      # Tags/releases the release branch's HEAD directly - this does not
      # wait for the PR below to be reviewed or merged.
      - name: Create release (and tag) and upload tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" ./*.tgz \
            --title "v${{ inputs.version }}" \
            --target "$(git rev-parse HEAD)" \
            --generate-notes

      - name: Open PR to bring the version bump back into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ inputs.version }}" \
            --title "Release v${{ inputs.version }}" \
            --body "Version bump for the v${{ inputs.version }} release (already tagged and published - this PR just brings package.json on main back in sync)."

      - name: Auto-merge the release PR into main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "release/v${{ inputs.version }}" --merge --auto --delete-branch
